<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pukyyy Ka Buddayy 😎 </title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:"Poppins", sans-serif;
background: linear-gradient(180deg,#ffe45c,#ffd400);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:#333;
}

/* CARD */

.card{
background:white;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 30px 70px rgba(0,0,0,.25);
max-width:640px;
width:92%;
position:relative;
}

/* REAL MINIONS */

.minionsReal{
width:60vw;
max-width:500px;
animation:minionBounce 2.5s infinite;
}

@keyframes minionBounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

/* REAL AGNES */

.agnesReal{
position:absolute;
right:-10px;
bottom:0;
width:25vw;
max-width:175px;
pointer-events:none;

animation:agnesFloat 3s ease-in-out infinite;
}

@keyframes agnesFloat{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

/* COUNTDOWN */

#countdown{
font-size:2rem;
margin:15px 0;
font-weight:600;
}

/* DAILY */

.daily{
font-size:1.1rem;
color:#1565c0;
margin-top:6px;
}

/* CHAOS */

.chaos{
position:absolute;
font-size:28px;
font-weight:900;
color:#000;   /* main black text */

text-shadow:
0 0 3px #fff,
0 0 6px #fff,
0 0 12px #00eaff,
0 0 20px #00eaff,
0 0 30px #00eaff;

animation:pop 1.2s forwards;
}

@keyframes pop{
from{transform:scale(.3);opacity:0}
to{transform:scale(1);opacity:1}
}

button{
margin-top:18px;
padding:12px 24px;
border:none;
border-radius:999px;
background:#1565c0;
color:white;
font-weight:600;
cursor:pointer;
}

/* FINAL */

.final{
display:none;
font-size:2.8rem;
margin-top:20px;
}

#chaosOverlay{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
opacity:0;
pointer-events:none;
transition:0.5s;
}

#chaosGif{
width:50%;
height:50%;
object-fit:cover;
}
  
</style>
  
</head>

<body>

<audio id="music" loop preload="auto">
<source src="/Bday/Minion.mp3" type="audio/mpeg">
</audio>

<div class="card">

<img src="/Bday/IMG_7782.webp" class="minionsReal">

<img src="/Bday/IMG_7721.gif" class="agnesReal">

<h1>2 Days For My Minion's Day 😆</h1>

<div id="countdown"></div>

<div class="daily" id="daily"></div>

<button onclick="chaos()">Pretty Please?</button>

<div class="final" id="final">🎉 HAPPYY BIRTHDAY PUKYY!! 🎉</div>

</div>

<script>

let clickCount = 0;

/* MUSIC */

const music=document.getElementById("music")
document.body.addEventListener("click",()=>music.play(),{once:true})

/* DAILY MESSAGES */

const messages=[
"For you I would steal the moon 😌"
]

document.getElementById("daily").innerText=
messages[Math.floor(Math.random()*messages.length)]

/* CHAOS TEXT */

const words=[
"BELLO",
"BANANAAAA!",
"WHAAT??",
"Tulaliloo ti amo!!",
"BEE-DO BEE-DO POLICE!!",
"Por smoochie smoochie? 😚",
"Agnes",
"Pretty please? 🥺",
"It's so fluffy!!!",
"Does this count as annoying? 😝",
"Underwearrr",
"Aa panirtikamasala",
"Stoppaaa",
"One in a minion",
"Uh oh",
"Can I keep it? 🥺👉👈",
"Steal the moon",
"Illuminatioooon",
"Blehh",
"Gru"
]

function chaos(){

// ⭐ count clicks
clickCount++;

// ✅ ORIGINAL CHAOS (unchanged)
confetti({particleCount:120,spread:100});

let t=document.createElement("div");
t.className="chaos";
t.innerText=words[Math.floor(Math.random()*words.length)];
t.style.left=Math.random()*80+"vw";
t.style.top=Math.random()*70+"vh";
document.body.appendChild(t);

setTimeout(()=>t.remove(),1200);

// ⭐ EXTRA EASTER EGG (only every 100th click)
if(clickCount % 50 === 0){

confetti({particleCount:400,spread:180}); // bonus blast 😏

const overlay = document.getElementById("chaosOverlay");

overlay.style.opacity = "1";
overlay.style.pointerEvents = "auto";

setTimeout(()=>{
overlay.style.opacity = "0";
overlay.style.pointerEvents = "none";
},2500);

}

}

/* COUNTDOWN */

const target=new Date("April 04, 2026 00:00:00").getTime()

setInterval(()=>{
let now=new Date().getTime()
let diff=target-now

if(diff<=0){

if(diff<=0){

document.querySelector(".card").style.display="none";

confetti({particleCount:600,spread:200});
confetti({particleCount:600,spread:200});

const overlay = document.getElementById("overlay");
overlay.style.opacity = "1";
overlay.style.pointerEvents = "auto";

return;
}
}

let d=Math.floor(diff/86400000)
let h=Math.floor(diff%86400000/3600000)
let m=Math.floor(diff%3600000/60000)
let s=Math.floor(diff%60000/1000)

document.getElementById("countdown").innerHTML=
`${d}d ${h}h ${m}m ${s}s`

},1000)

</script>
  
<div id="chaosOverlay">
    <img src="./IMG_7781.jpeg" id="chaosGif">
</div>
  
</body>
</html>
