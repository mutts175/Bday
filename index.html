<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Countdown 2026! 🦄</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --minion-yellow: #FFEF00;
            --agnes-pink: #FF85A2;
            --denim: #2B59C3;
        }

        body {
            background-color: var(--agnes-pink);
            background-image: radial-gradient(var(--minion-yellow) 20%, transparent 20%),
                              radial-gradient(var(--minion-yellow) 20%, transparent 20%);
            background-position: 0 0, 50px 50px;
            background-size: 100px 100px;
            font-family: 'Fredoka One', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .main-card {
            background: white;
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 0 rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 8px solid var(--denim);
            position: relative;
        }

        .gif-container img {
            width: 100%;
            max-width: 250px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .countdown-display {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .time-segment {
            background: var(--denim);
            color: white;
            padding: 10px;
            border-radius: 15px;
        }

        .time-segment div { font-size: 1.8rem; }
        .time-segment span { font-size: 0.7rem; font-family: 'Open Sans'; text-transform: uppercase; }

        .daily-message {
            background: #fff0f3;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            color: #d63384;
            font-family: 'Open Sans', sans-serif;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            position: relative;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-family: 'Fredoka One';
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #yes-btn { background: #4CAF50; color: white; box-shadow: 0 5px 0 #2e6b31; }
        #no-btn { background: #f44336; color: white; box-shadow: 0 5px 0 #b71c1c; position: absolute; left: 60%; }

        .music-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border: 3px solid var(--denim);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <button class="music-toggle" onclick="toggleMusic()">🎵</button>
    <audio id="bday-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="main-card">
        <div class="gif-container">
            <img id="main-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueW9mZ3F4Z3F4Z3F4Z3F4Z3F4Z3F4Z3F4Z3F4Z3F4Z3F4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/11S7aQol2mdPUI/giphy.gif" alt="Agnes Happy">
        </div>

        <h1 style="color: var(--denim); margin-bottom: 10px;">Are you excited?!</h1>
        
        <div class="daily-message" id="daily-text">
            Checking for today's surprise...
        </div>

        <div class="countdown-display">
            <div class="time-segment"><div id="days">00</div><span>Days</span></div>
            <div class="time-segment"><div id="hours">00</div><span>Hrs</span></div>
            <div class="time-segment"><div id="mins">00</div><span>Mins</span></div>
            <div class="time-segment"><div id="secs">00</div><span>Secs</span></div>
        </div>

        <div class="button-group" style="height: 60px;">
            <button id="yes-btn" class="btn" onclick="celebrate()">YES! 🍌</button>
            <button id="no-btn" class="btn" onmouseover="moveNoButton()">Not yet...</button>
        </div>
    </div>

    <script>
        // Target Date: April 4, 2026
        const target = new Date("April 4, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById('days').innerText = Math.floor(diff / (86400000));
            document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('mins').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('secs').innerText = Math.floor((diff % 60000) / 1000);
        }
        setInterval(updateCountdown, 1000);

        // Daily Content Logic
        const surprises = [
            "Today's Fact: Minions love bananas! 🍌",
            "Agnes says: You look as fluffy as a unicorn today!",
            "Did you know? Minions have their own language!",
            "Countdown Tip: Start planning the party hats!",
            "Fun Fact: Agnes's unicorn is named 'Fluffy'!"
        ];
        document.getElementById('daily-text').innerText = surprises[new Date().getDate() % surprises.length];

        // Interactive "No" Button
        let noClicks = 0;
        function moveNoButton() {
            const noBtn = document.getElementById('no-btn');
            const yesBtn = document.getElementById('yes-btn');
            
            // Make the yes button bigger each time!
            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentSize + 2) + "px";
            yesBtn.style.padding = "20px 40px";

            // Move the no button randomly
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            
            const texts = ["Are you sure?", "Wait!", "Bello?", "Banana??", "It's so fluffy!"];
            noBtn.innerText = texts[Math.floor(Math.random() * texts.length)];
        }

        function celebrate() {
            document.getElementById('main-gif').src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueW9mZ3F4Z3F4Z3F4Z3F4Z3F4Z3F4Z3F4Z3F4Z3F4Z3F4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/mP8u8V0Q5PZkY/giphy.gif";
            alert("YAY! The Minions are getting the party ready!");
        }

        function toggleMusic() {
            const audio = document.getElementById('bday-music');
            if (audio.paused) {
                audio.play();
                document.querySelector('.music-toggle').innerText = "⏸️";
            } else {
                audio.pause();
                document.querySelector('.music-toggle').innerText = "🎵";
            }
        }
    </script>
</body>
</html>
